format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 3

[git_branch]
format = " [$symbol$branch]($style)"
symbol = "git:"
style = "bold purple"

[git_status]
format = "[$all_status$ahead_behind]($style) "
style = "bold red"

[cmd_duration]
min_time = 2000
format = " took [$duration]($style)"
style = "yellow"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
