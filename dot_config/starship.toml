# ------------------------------------------------------------------------------
# Starship Prompt
# ------------------------------------------------------------------------------

format = """
$directory\
$git_branch\
$git_status\
$cmd_duration\
$time\
$line_break\
$character"""

# --- Path & Git ---

[directory]
format = "[$path]($style) "
style = "bold cyan"
truncation_length = 3
truncate_to_repo = true

[git_branch]
format = "on [$symbol$branch]($style) "
symbol = "🌿 "
style = "bold purple"

[git_status]
format = "[$all_status$ahead_behind$stashed]($style)"
stashed = " 📦${count}"
style = "bold red"

# --- Prompt UI ---

[cmd_duration]
min_time = 500
format = "underwent [$duration]($style) "
style = "bold yellow"

[time]
disabled = false
format = "[$time]($style) "
style = "dim white"
time_format = "%H:%M %Z"

[character]
success_symbol = "[→](bold green)"
error_symbol = "[→](bold red)"
